
services:
  web:
    build:
      context: ..
      dockerfile: docker/backend.Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ..:/app
    depends_on:
      - redis
    command: python backend/manage.py runserver 0.0.0.0:8000

  worker:
    build:
      context: ..
      dockerfile: docker/backend.Dockerfile
    command: celery -A config worker -l info
    depends_on:
      - redis

  redis:
    image: redis:7
    ports:
      - "6379:6379"